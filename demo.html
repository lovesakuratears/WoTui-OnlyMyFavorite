:root {

body {

.lightbox-close {
  position: absolute; top: -40px; right: -10px; background: rgba(255,255,255,0.15);
  color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;

}
.lightbox-close:hover { background: rgba(255,255,255,0.3); }

}
.lightbox-nav:hover { background: rgba(255,255,255,0.3); }

    // ── 工具函数 ──────────────────────────────────────────────────────────────
    function formatTime(timeStr) {
      if (!timeStr) return '未知时间';
      const d = dayjs(timeStr);
      if (!d.isValid()) return timeStr;
      const diff = dayjs().diff(d, 'hour');
      if (diff < 24) return d.fromNow();
      if (diff < 24 * 7) return d.format('MM-DD HH:mm');
      return d.format('YYYY-MM-DD HH:mm');
    }
    function formatCount(n) {
      if (!n && n !== 0) return '0';
      if (n >= 10000) return (n / 10000).toFixed(1) + '万';
      return String(n);
    }
    function extractUid(input) {
      if (!input) return null;
      const trimmed = input.trim();
      if (/^\d{6,}$/.test(trimmed)) return trimmed;
      const urlMatch = trimmed.match(/weibo\.com\/(?:u\/)?(\d{6,})/);
      if (urlMatch) return urlMatch[1];
      return null;
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    function Lightbox({ images, startIndex, onClose }) {
      const [current, setCurrent] = useState(startIndex || 0);
      const prev = useCallback(() => setCurrent(c => (c - 1 + images.length) % images.length), [images.length]);
      const next = useCallback(() => setCurrent(c => (c + 1) % images.length), [images.length]);
      useEffect(() => {
        const h = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowLeft') prev();
          if (e.key === 'ArrowRight') next();
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [onClose, prev, next]);
      if (!images || images.length === 0) return null;
      return (
        <div className="lightbox-overlay" onClick={onClose}>
          <div className="lightbox-container" onClick={e => e.stopPropagation()}>
            <button className="lightbox-close" onClick={onClose} title="关闭 (ESC)">✕</button>
            <img className="lightbox-img" src={images[current]} alt={`图片 ${current + 1}`}
              onError={e => { e.target.src = 'https://picsum.photos/seed/err/400/300'; }} />
            {images.length > 1 && <>
              <button className="lightbox-nav lightbox-prev" onClick={prev} title="上一张 (←)">‹</button>
              <button className="lightbox-nav lightbox-next" onClick={next} title="下一张 (→)">›</button>
              <div className="lightbox-counter">{current + 1} / {images.length}</div>
            </>}
          </div>
        </div>
      );
    }

                  {activePosts.length === 0 ? (
                    <div className="feed-no-posts">
                      <p>还没有归档任何微博</p>
                      <button className="btn btn-primary" onClick={() => showToast('📦 Demo 模式：需要启动后端服务才能实际抓取')}>
                        🔄 立即抓取
                      </button>
                    </div>
                  ) : (
                    <>
                      <div className="posts-list">
                        {activePosts.map(post => (
                          <PostCard key={post.mid} post={post}
                            profile={activeProfile}
                            onLightbox={(imgs, idx) => setLightbox({ open: true, images: imgs, idx })} />
                        ))}
                      </div>
                      <div className="feed-stats">
                        共 {activePosts.length} 条已归档
                        <span className="mock-badge">Mock 数据</span>
                      </div>
                    </>
                  )}
                </div>
              )}
            </main>
          </div>

          <footer className="status-footer">
            <span>📦 本地数据库 | 微博归档器 v1.0</span>
            <span>{activePosts.length > 0 ? `最近抓取: ${formatTime(activeSub?.addedAt)}` : '等待抓取...'}</span>
            <span>{subs.length} 个订阅中</span>
          </footer>

          {showAdd && <AddModal onClose={() => setShowAdd(false)} onSuccess={handleAdd} />}
          {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
          {lightbox.open && (
            <Lightbox images={lightbox.images} startIndex={lightbox.idx}
              onClose={() => setLightbox({ open: false, images: [], idx: 0 })} />
          )}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
