services:
  wotui:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - wotui:latest
    image: wotui:latest
    container_name: wotui
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      # 持久化用户数据（帖子、图片、Cookie）
      - wotui_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3030
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wotui_data:
    driver: local
